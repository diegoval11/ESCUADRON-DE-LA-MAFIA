<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel · CodeQuest</title>
  <script>(function(){try{if(localStorage.getItem('codequest_theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}})();</script>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="has-bottom-nav">
  <div class="brand">
    <div class="brand-icon" aria-hidden="true">Q</div>
    CodeQuest
  </div>
  <div class="hub-wrap hub-centered app-shell">
    <header class="app-header">
      <div class="app-header-start">
        <span class="nav-greeting" id="greeting">Hola</span>
      </div>
      <div class="app-header-actions">
        <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Cambiar entre tema claro y oscuro">
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle-label">Oscuro</span>
        </button>
        <a href="#" id="logoutBtn" class="nav-exit">Salir</a>
      </div>
    </header>
    <div class="card dashboard-card">
      <div class="avatar" id="avatarLetter">?</div>
      <h2 id="welcomeMsg">Hola</h2>
      <p class="subtitle">Tu progreso de hoy</p>
      <div class="stats-bar">
        <div class="stat-pill"><div class="num" id="statPoints">0</div><div class="label">Puntos</div></div>
        <div class="stat-pill"><div class="num" id="statLevel">1</div><div class="label">Nivel</div></div>
        <div class="stat-pill"><div class="num" id="statStreak">🔥 0</div><div class="label">Racha</div></div>
      </div>
      <a href="game.html" class="btn-primary">Reto diario</a>
    </div>
  </div>
  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="dashboard.html" class="bottom-nav-item is-active"><svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5L12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5z" fill="currentColor"/></svg><span>Panel</span></a>
    <a href="game.html" class="bottom-nav-item"><svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7L8 5z" fill="currentColor"/></svg><span>Jugar</span></a>
    <a href="leaderboard.html" class="bottom-nav-item"><svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h2v8H7V4zm4 3h2v5h-2V7zm4 4h2v4h-2v-4zM5 20h14v2H5v-2z" fill="currentColor"/></svg><span>Ranking</span></a>
    <a href="achievements.html" class="bottom-nav-item"><svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l2.4 5.4L20 8.2l-4 3.8.9 5.5L12 15.8 7.1 17.5 8 12 4 8.2l5.6-.8L12 2z" fill="currentColor"/></svg><span>Logros</span></a>
  </nav>
  <script>
    const token = localStorage.getItem('codequest_token');
    if (!token) { window.location.href = 'login.html'; }
    async function loadDashboard() {
      try {
        const res = await fetch('/api/get-user-stats', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (data.ok) {
          const username = JSON.parse(atob(token.split('.')[1])).username;
          document.getElementById('greeting').textContent = 'Hola, ' + username;
          document.getElementById('avatarLetter').textContent = username.charAt(0).toUpperCase();
          document.getElementById('welcomeMsg').textContent = 'Hola, ' + username;
          document.getElementById('statPoints').textContent = data.points;
          document.getElementById('statLevel').textContent = data.level;
          document.getElementById('statStreak').textContent = '🔥 ' + data.streak;
        }
      } catch {}
    }
    loadDashboard();
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('codequest_token');
      window.location.href = 'login.html';
    });
  </script>
  <script src="assets/js/theme.js"></script>
</body>
</html>
